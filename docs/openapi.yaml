openapi: 3.1.0
info:
  title: Support Desk API
  version: 1.0.0
  description: API v1 for tenant-scoped B2B customer support tickets.
servers:
  - url: /api/v1
security:
  - sanctumToken: []
components:
  securitySchemes:
    sanctumToken:
      type: http
      scheme: bearer
  schemas:
    Error:
      type: object
      properties:
        message: { type: string }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
    PaginationMeta:
      type: object
      properties:
        current_page: { type: integer }
        per_page: { type: integer }
        total: { type: integer }
        last_page: { type: integer }
    TicketCreate:
      type: object
      required: [subject, description]
      properties:
        subject: { type: string, maxLength: 255 }
        description: { type: string, maxLength: 20000 }
        priority: { type: string, enum: [low, normal, high, urgent] }
        project_id: { type: string, nullable: true }
        tracker_id: { type: string, nullable: true }
        category_id: { type: string, nullable: true }
        tag_names:
          type: array
          items: { type: string }
        custom_fields:
          type: object
          additionalProperties: true
        target_department_ids:
          type: array
          items: { type: string }
        target_user_ids:
          type: array
          items: { type: string }
    Ticket:
      type: object
      properties:
        id: { type: string, description: Stable public API identifier. Existing API paths continue to use this value, not ticket_number. }
        ticket_number: { type: integer, description: Company-scoped human ticket number starting at 100001. }
        display_id: { type: string, example: '#100001' }
        company_id: { type: string }
        subject: { type: string }
        description: { type: string }
        status: { type: string }
        priority: { type: string }
        source: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    TicketBulkUpdate:
      type: object
      required: [ticket_ids]
      properties:
        ticket_ids:
          type: array
          items: { type: string }
        status: { type: string, enum: [resolved, closed], nullable: true }
        priority: { type: string, enum: [low, normal, high, urgent], nullable: true }
        tag_names:
          type: array
          items: { type: string }
    TicketSavedView:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        filters:
          type: object
          additionalProperties: true
        columns:
          type: array
          nullable: true
          items: { type: string }
        sort:
          type: object
          nullable: true
          additionalProperties: true
    KnowledgeBaseCategory:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        articles_count: { type: integer }
    KnowledgeBaseArticle:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        slug: { type: string }
        excerpt: { type: string, nullable: true }
        body: { type: string }
        category: { type: string, nullable: true }
        category_slug: { type: string, nullable: true }
        published_at: { type: string, format: date-time, nullable: true }
    CsatSubmit:
      type: object
      required: [rating]
      properties:
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string, maxLength: 2000, nullable: true }
paths:
  /csat/{token}:
    post:
      summary: Submit a single-use CSAT survey response
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CsatSubmit'
      responses:
        '200':
          description: CSAT response accepted.
  /meta/ticket-options:
    get:
      summary: List ticket form options
      description: Requires `tickets:read` or `tickets:create`.
      responses:
        '200':
          description: Ticket statuses, priorities, projects, trackers, categories, tags, and custom fields.
        '403':
          description: Missing required ability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /tickets:
    get:
      summary: List tickets visible to the API client tenant
      description: Requires `tickets:read`. Ticket resources include `ticket_number` and `display_id`; route parameters remain the public `id`.
      parameters:
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: per_page
          schema: { type: integer, maximum: 100 }
      responses:
        '200':
          description: Paginated ticket resources.
        '403':
          description: Missing `tickets:read`.
    post:
      summary: Create a ticket
      description: Requires `tickets:create`.
      parameters:
        - in: header
          name: Idempotency-Key
          schema: { type: string }
          required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketCreate'
      responses:
        '201':
          description: Created ticket.
  /tickets/bulk:
    patch:
      summary: Company-safe bulk ticket update
      description: Requires `tickets:bulk_update`. API clients can resolve or close tickets, change priority, and replace tags for tickets in their tenant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketBulkUpdate'
      responses:
        '200':
          description: Count of updated tickets.
  /tickets/{ticket}:
    get:
      summary: Show a ticket
      description: Requires `tickets:read`. `{ticket}` is the public ticket `id`; `ticket_number` is returned for display/search only.
      parameters:
        - in: path
          name: ticket
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Ticket detail.
  /tickets/{ticket}/comments:
    post:
      summary: Add a public ticket comment
      description: Requires `tickets:comment`.
      parameters:
        - in: path
          name: ticket
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, maxLength: 20000 }
      responses:
        '201':
          description: Created comment.
  /tickets/{ticket}/attachments:
    post:
      summary: Upload a public ticket attachment
      description: Requires `tickets:comment`. Uploads are limited by the configured attachment MIME, extension, and size allowlists.
      parameters:
        - in: path
          name: ticket
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        '201':
          description: Created attachment.
  /knowledge-base/categories:
    get:
      summary: List published public knowledge base categories
      description: Requires `knowledge_base:read`.
      responses:
        '200':
          description: Category list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/KnowledgeBaseCategory'
  /knowledge-base/articles:
    get:
      summary: List published public knowledge base articles
      description: Requires `knowledge_base:read`.
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
      responses:
        '200':
          description: Article list.
  /knowledge-base/articles/{slug}:
    get:
      summary: Show a published public knowledge base article
      description: Requires `knowledge_base:read`.
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Article detail.
  /ticket-views:
    get:
      summary: List shared company ticket views
      description: API ticket views are tenant-scoped shared views.
      responses:
        '200':
          description: Saved view list.
    post:
      summary: Create a shared company ticket view
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketSavedView'
      responses:
        '201':
          description: Created saved view.
  /ticket-views/{ticketView}:
    patch:
      summary: Update a shared company ticket view
      parameters:
        - in: path
          name: ticketView
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Updated saved view.
    delete:
      summary: Delete a shared company ticket view
      parameters:
        - in: path
          name: ticketView
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Deleted.
  /reports/tickets.csv:
    get:
      summary: Export visible tickets as CSV
      description: Requires `reports:read`. Filters match ticket list semantics.
      parameters:
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: priority
          schema: { type: string }
        - in: query
          name: project
          schema: { type: string }
        - in: query
          name: tracker
          schema: { type: string }
        - in: query
          name: tag
          schema: { type: string }
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
        - in: query
          name: sla
          schema: { type: string, enum: [first_response_breached, resolution_breached, breached, due_soon] }
      responses:
        '200':
          description: CSV file.
  /reports/tickets.pdf:
    get:
      summary: Export visible tickets as PDF
      description: Requires `reports:read`. Supports the same filters as `/reports/tickets.csv`.
      responses:
        '200':
          description: PDF file.
  /reports/csat.csv:
    get:
      summary: Export visible CSAT surveys as CSV
      description: Requires `reports:read`.
      parameters:
        - in: query
          name: rating
          schema: { type: integer, minimum: 1, maximum: 5 }
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        '200':
          description: CSV file.
  /reports/csat.pdf:
    get:
      summary: Export visible CSAT surveys as PDF
      description: Requires `reports:read`. Supports the same filters as `/reports/csat.csv`.
      responses:
        '200':
          description: PDF file.
